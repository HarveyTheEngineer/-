            <div>
                <form id="reservationForm">
                    <h3>填寫預約</h3>
                    <fieldset class="reservationForm_1">
                        <legend>基本資料</legend>

                        <label for="username">▫️姓名：</label>
                        <input type="text" id="username">
                        <br><br>
                        <label for="userphone">▫️電話：</label>
                        <input type="tel" id="userphone">

                    </fieldset>


                    <fieldset class="reservationForm_2">
                        <legend>預約內容</legend>

                        ▫️預約日期/ 時段：
                        <input type="text" id="date">

                        <br><br>

                        ▫️預算(不含卸甲)：
                        <input type="text" id="budget">

                        <br><br>

                        ▫️有無需卸甲：
                        <input name="nailclean" type="radio" id="yesClean">
                        <label for="yesClean">是</label>

                        <input name="nailclean" type="radio" id="noClean">
                        <label for="noClean">否</label>

                        <br><br>

                        ▫️施作項目：(單色/造型)
                        <input name="nailStyle" type="radio" id="sig-color">
                        <label for="sig-color">單色</label>

                        <input name="nailStyle" type="radio" id="customized">
                        <label for="customized">造型</label>

                        <br><br>

                        ▫️是否已詳閱預約須知：
                        <input name="read" type="radio" id="yesRead">
                        <label for="yesRead">是</label>

                    </fieldset>

                    <button type="submit" id="submitBtn">送出預約</button>
                    <p>💖收到您的訊息後，將盡快回覆😉</p>
                </form>
            </div>
        </section>
